    --t-title:26px;--t-detail:22px;--t-head:17px;--t-btn:16px;--t-card:15px;--t-body:14px;--t-sub:13px;--t-small:12px;--t-tiny:11px;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.6;overscroll-behavior-y:none;}
  .app{max-width:520px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);}
  .screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 22px 110px;}
  .screen.hidden{display:none;}
  .date{font-size:var(--t-small);color:var(--ink-faint);letter-spacing:1px;margin-bottom:6px;}
  .h1{font-size:var(--t-title);font-weight:600;letter-spacing:.5px;margin:0;line-height:1.3;}
  .h1 .uname{color:var(--accent);border-bottom:1.5px dashed var(--line-strong);cursor:pointer;}
  .title{font-size:var(--t-title);font-weight:600;letter-spacing:.5px;margin:0;}
  .sub{font-size:var(--t-sub);color:var(--ink-faint);margin-top:4px;}
  .iconbtn{border:none;background:rgba(var(--accent-rgb),0.12);color:var(--sage-deep);width:38px;height:38px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;}
  .iconbtn svg{width:20px;height:20px;}
  .iconbtn.dots{font-size:18px;}
  .back{display:inline-flex;align-items:center;gap:5px;border:none;background:none;color:var(--sage-deep);font:inherit;font-size:var(--t-card);cursor:pointer;padding:0;margin-bottom:16px;}
  .back svg{width:18px;height:18px;}
  .headrow{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
  .energy{background:var(--surface);border-radius:20px;padding:20px 20px 16px;box-shadow:var(--shadow-soft);margin-bottom:18px;}
  .energy .etop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .energy .etitle{font-size:var(--t-head);font-weight:600;}
  .energy .etag{font-size:var(--t-small);color:var(--sage-deep);background:rgba(var(--accent-rgb),0.16);border-radius:9px;padding:3px 11px;}
  .energy .etext{font-size:var(--t-body);color:var(--ink-soft);line-height:1.7;}
  .energy .emeta{display:flex;align-items:center;justify-content:space-between;margin-top:14px;font-size:var(--t-sub);color:var(--ink-faint);flex-wrap:wrap;gap:8px;}
  .energy .lucky{display:inline-flex;align-items:center;gap:6px;}
  .energy .lucky .ld{width:11px;height:11px;border-radius:50%;}

  .reveal-scrim.on .rcardbox{animation:rise .65s cubic-bezier(.16,1,.3,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(20px) scale(.97);}to{opacity:1;transform:none;}}
  .rcardbox .ctag{font-size:var(--t-small);letter-spacing:2px;font-weight:600;opacity:.85;margin-bottom:18px;}
  .rcardbox .cmsg{font-size:20px;line-height:1.8;font-weight:500;color:var(--ink);}
  .rcardbox .cdate{font-size:var(--t-small);color:var(--ink-faint);margin-top:22px;}
  .rcardbox .cglow{position:absolute;width:170px;height:170px;border-radius:50%;right:-55px;top:-55px;filter:blur(10px);opacity:.5;}
  .reveal-done{margin-top:22px;border:none;background:none;color:var(--ink-soft);font:inherit;font-size:var(--t-card);letter-spacing:3px;cursor:pointer;padding:8px 30px;}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.001s !important;transition-duration:.05s !important;}}
</style>
</head>

    lp:["这份安稳来得不容易，让它多停留一会儿。","不需要做什么，此刻的平静本身就够了。","你给了自己一个喘息的间隙，这很好。","心静下来的时候，很多事会慢慢有答案。","安静不是空白，是你愿意和自己待在一起。","能停下来歇口气，说明你照顾到了自己。","你值得这样不慌不忙的片刻。","把心放回原处的感觉，记住它。"],

    lu:["这阵子有点沉，没关系，情绪本来就有起落。","难受的时候，不用逼自己马上好起来。","你愿意把它记下来，已经是在好好待自己了。","难过是真的，但它不是你的全部。","低谷里也算数 —— 你今天还是来了。","给自己一点时间，光会慢慢回来。","撑了这么久，允许自己歇一会儿。","一个人的时候，也别忘了你值得被在乎。"]

    {id:"resonant",n:"共振呼吸",type:"breath",cat:"呼吸练习",meta:"5 分钟 · 情绪平衡",c1:"#D7E6DE",c2:"#BFD6CB",pattern:[{n:"吸气",s:5},{n:"呼气",s:5}],desc:"吸气 5 秒、呼气 5 秒，约每分钟 6 次。这个频率接近身体的共振点，能改善心率变异性（HRV），长期练习有助于情绪的自我调节，适合日常练习。"},
    {id:"nostril",n:"交替鼻孔呼吸",type:"breath",cat:"呼吸练习",meta:"5 分钟 · 安神",c1:"#E1DBE9",c2:"#D0C7DE",pattern:[{n:"左鼻 · 吸气",s:4},{n:"屏息",s:4},{n:"右鼻 · 呼气",s:4},{n:"右鼻 · 吸气",s:4},{n:"屏息",s:4},{n:"左鼻 · 呼气",s:4}],desc:"源自瑜伽的 Nadi Shodhana。用拇指与无名指交替按住一侧鼻孔——一侧吸气，换边呼气，再换回来。能平衡身心、安定思绪。跟着屏幕提示左右切换，动作要轻柔。"},
    {id:"ocean",n:"海洋呼吸",type:"breath",cat:"呼吸练习",meta:"5 分钟 · 专注呼吸",c1:"#D2E0E6",c2:"#B8CED8",pattern:[{n:"吸气",s:5},{n:"呼气",s:5}],desc:"瑜伽中的乌加依呼吸（Ujjayi）。微微收紧喉咙，让吸气和呼气经过时发出类似海浪的轻声。这个声音帮你把注意力留在呼吸上，让节奏变得绵长均匀。"},
    {id:"sigh",n:"生理叹息",type:"breath",cat:"呼吸练习",meta:"3 分钟 · 快速平复",c1:"#DCE6DC",c2:"#C2D4C2",pattern:[{n:"吸气",s:3},{n:"再吸一口",s:1},{n:"长长呼气",s:6}],desc:"两段式吸气后长长呼出：先吸一口，再小补一口，然后缓缓呼到底。这是斯坦福研究发现的、最快平复紧张的呼吸法之一，几次就有效果。"},
    {id:"scan_full",n:"全身扫描",type:"audio",cat:"身体扫描",meta:"15 分钟 · 身体扫描",c1:"#D8DEE3",c2:"#C0CAD2",desc:"把注意力像扫描仪一样，从头顶缓缓移到脚尖，逐一觉察身体每个部位的感觉，松开紧绷之处。常用于睡前或久坐之后。"},
    {id:"pmr",n:"渐进式肌肉放松",type:"audio",cat:"身体扫描",meta:"12 分钟 · 身体扫描",c1:"#D6DCE2",c2:"#BEC8D0",desc:"依次绷紧再松开身体各处的肌肉，在一紧一松之间，让身体学会真正地放松下来。"},
    {id:"ground_body",n:"脚踏实地",type:"audio",cat:"身体扫描",meta:"6 分钟 · 身体扫描",c1:"#DADEE0",c2:"#C2CACE",desc:"把注意力放到双脚与地面接触的感觉上，让飘忽的思绪重新落回身体、落回此刻。"},
    {id:"sleep_scan",n:"睡前身体扫描",type:"audio",cat:"身体扫描",meta:"18 分钟 · 身体扫描",c1:"#D4DAE4",c2:"#BCC4D6",desc:"躺在床上，跟着引导从脚到头逐一放松，让身体一点点沉下来，平稳地进入睡眠。"},
    {id:"mind_breath",n:"观呼吸",type:"audio",cat:"正念觉察",meta:"10 分钟 · 正念觉察",c1:"#DCE6EC",c2:"#C4D5E0",desc:"什么都不用做，只是观察呼吸自然地进出。走神了，就温柔地把注意力带回呼吸上。这是正念最基础的功课。"},
    {id:"sound_med",n:"声音冥想",type:"audio",cat:"正念觉察",meta:"8 分钟 · 正念觉察",c1:"#DAE4EC",c2:"#C2D2E0",desc:"只是听——远处的、近处的声音。不去分辨好坏，让声音来了又走，练习不加评判地觉察。"},
    {id:"thoughts",n:"念头来去",type:"audio",cat:"正念觉察",meta:"10 分钟 · 正念觉察",c1:"#DEE6EE",c2:"#C6D4E2",desc:"把念头想象成天上的云，看着它们飘过，不抓住、也不推开。你只是那片看云的天空。"},
    {id:"now_aware",n:"此刻觉察",type:"audio",cat:"正念觉察",meta:"5 分钟 · 正念觉察",c1:"#D8E2EA",c2:"#C0D0DE",desc:"用一小段时间，回到当下的感官：此刻你看到、听到、感觉到什么。短短几分钟，重新落地。"},
    {id:"walk_med",n:"行走冥想",type:"audio",cat:"正念觉察",meta:"12 分钟 · 正念觉察",c1:"#DCE4E8",c2:"#C4D4DA",desc:"走路时，把注意力放在每一步与地面的接触上。慢慢走，把日常的行走变成一次清醒的练习。"},
    {id:"sleep_deep",n:"深度睡眠引导",type:"audio",cat:"助眠放松",meta:"20 分钟 · 助眠放松",c1:"#D5DAE6",c2:"#BFC6DC",desc:"循着缓慢的引导，一步步放松身体、放下白天的念头，让自己平稳地滑入睡眠。"},
    {id:"relax_sleep",n:"睡前放松",type:"audio",cat:"助眠放松",meta:"12 分钟 · 助眠放松",c1:"#D7DCE8",c2:"#C1C8DE",desc:"卸下一天的紧张，用温柔的引导让身心慢下来，为入睡做好准备。"},
    {id:"sink_body",n:"身体沉降",type:"audio",cat:"助眠放松",meta:"15 分钟 · 助眠放松",c1:"#D3D8E6",c2:"#BDC4DC",desc:"想象身体像石头一样，一点点沉入柔软的床里，越来越重、越来越松。"},
    {id:"count_breath",n:"数息入眠",type:"audio",cat:"助眠放松",meta:"10 分钟 · 助眠放松",c1:"#D9DEEA",c2:"#C3CADE",desc:"安静地数着自己的呼吸，让数字带走纷乱的念头，温和地引你入睡。"},
    {id:"grat_practice",n:"感恩练习",type:"audio",cat:"感恩冥想",meta:"8 分钟 · 感恩冥想",c1:"#EFDCDA",c2:"#E4C5C2",desc:"回想今天三件值得感谢的小事，无论多微小。练习把注意力放在已经拥有的东西上。"},
    {id:"thank_body",n:"感谢身体",type:"audio",cat:"感恩冥想",meta:"7 分钟 · 感恩冥想",c1:"#F0DEDC",c2:"#E6C8C5",desc:"把感谢送给身体的每个部位——它们默默支撑着你度过每一天。"},
    {id:"three_good",n:"三件好事",type:"audio",cat:"感恩冥想",meta:"6 分钟 · 感恩冥想",c1:"#EEDAD8",c2:"#E2C2BF",desc:"回想今天发生的三件好事，再小都算。这个简单的练习，能慢慢调亮你看世界的滤镜。"},

    {id:"accept_emo",n:"接纳情绪",type:"audio",cat:"情绪疗愈",meta:"9 分钟 · 情绪疗愈",c1:"#EFE0D6",c2:"#E4CCBA",desc:"允许情绪存在，不急着推开它。当你愿意陪着一种感受，它往往就慢慢松动了。"},

      q.feat.forEach(function(n){h+='<button class="emo" data-name="'+esc(n)+'" style="border:1.5px solid var(--line);background:var(--surface);border-radius:18px;padding:20px 12px 16px;cursor:pointer;display:flex;flex-direction:column;align-items:center"><div style="width:40px;height:40px;border-radius:50%;margin-bottom:12px;background:radial-gradient(circle at 38% 32%,'+q.c1+','+q.c2+');box-shadow:inset 0 -3px 7px rgba(255,255,255,0.45)"></div><div style="font-size:var(--t-card);font-weight:500">'+n+'</div></button>';});
      h+='</div><div style="font-size:var(--t-sub);color:var(--ink-faint);letter-spacing:1px;margin:28px 4px 14px;font-weight:500">其他感受</div><div style="display:flex;flex-wrap:wrap;gap:9px"><button class="emoadd" style="border:1.5px dashed var(--line-strong);background:var(--surface);border-radius:20px;padding:9px 16px;font:inherit;font-size:var(--t-body);color:var(--sage-deep);cursor:pointer">+ 自定义</button>';
      (custom[q.key]||[]).forEach(function(n){h+='<button class="emo" data-name="'+esc(n)+'" style="border:1.5px solid var(--line);background:var(--surface);border-radius:20px;padding:9px 16px;font:inherit;font-size:var(--t-body);color:var(--ink-soft);cursor:pointer">'+esc(n)+'</button>';});
      q.others.forEach(function(n){h+='<button class="emo" data-name="'+esc(n)+'" style="border:1.5px solid var(--line);background:var(--surface);border-radius:20px;padding:9px 16px;font:inherit;font-size:var(--t-body);color:var(--ink-soft);cursor:pointer">'+n+'</button>';});
      h+='</div>'; pickInner.innerHTML=h;
      document.getElementById("pb2").onclick=function(){renderPick("cats");};
      Array.prototype.forEach.call(pickInner.querySelectorAll(".emo"),function(b){b.onclick=function(){openNote(pickQuad,b.getAttribute("data-name"));};});
      pickInner.querySelector(".emoadd").onclick=function(){openCustom(pickQuad);};
    }
  }
  var noteLevel="中",noteTopic=null;
  function openNote(qk,name){
    var q=quadByKey(qk);noteLevel="中";noteTopic=null;
    var h='<div class="emo-orb" style="background:radial-gradient(circle at 38% 32%,'+q.c1+','+q.c2+')"></div><h3>此刻 · '+esc(name)+'</h3><p style="margin-bottom:0">记下来，给此刻一个位置。</p><div class="fld">强度</div><div class="seg" id="sl">'+['轻','中','重'].map(function(l){return '<button data-l="'+l+'"'+(l==="中"?' class="on"':'')+'>'+l+'</button>';}).join('')+'</div><div class="fld">和什么有关？（可不选）</div><div class="tchips" id="tc">'+TOPICS.map(function(t){return '<button data-t="'+t+'">'+t+'</button>';}).join('')+'</div><div class="fld">想多说一句吗？</div><textarea id="ni" placeholder="发生了什么，或者只是想记下这个感觉…"></textarea><button class="sheet-act primary" id="lb">记录此刻</button><button class="sheet-act" id="cb" style="margin-top:10px">再想想</button>';
    openSheet(h);
    Array.prototype.forEach.call(document.querySelectorAll("#sl button"),function(b){b.onclick=function(){noteLevel=b.getAttribute("data-l");Array.prototype.forEach.call(document.querySelectorAll("#sl button"),function(x){x.classList.remove("on");});b.classList.add("on");};});
    Array.prototype.forEach.call(document.querySelectorAll("#tc button"),function(b){b.onclick=function(){var t=b.getAttribute("data-t");if(noteTopic===t){noteTopic=null;b.classList.remove("on");}else{noteTopic=t;Array.prototype.forEach.call(document.querySelectorAll("#tc button"),function(x){x.classList.remove("on");});b.classList.add("on");}};});
    document.getElementById("cb").onclick=closeSheet;
    document.getElementById("lb").onclick=function(){var note=(document.getElementById("ni").value||"").trim();var msg=pickLine(qk),ts=Date.now();var e={id:ts,ts:ts,quad:qk,emotion:name,level:noteLevel,topic:noteTopic,note:note,msg:msg};entries.unshift(e);ls(K.en,entries);closeSheet();if(profile.moodColor)applyTheme();renderHome();show("home","home");reveal(e);};
    setTimeout(function(){var n=document.getElementById("ni");if(n)n.focus();},320);
  }
  function openCustom(qk){var q=quadByKey(qk);openSheet('<h3>给这个感受起个名字</h3><p>它会留在「'+q.name+'」里，下次还能直接选。</p><input type="text" id="cin" maxlength="6" placeholder="两到四个字，比如「踏实」"><button class="sheet-act primary" id="cok">添加并选择</button><button class="sheet-act" id="ccl" style="margin-top:10px">取消</button>');document.getElementById("ccl").onclick=closeSheet;document.getElementById("cok").onclick=function(){var v=(document.getElementById("cin").value||"").trim();if(!v)return;if(!custom[qk])custom[qk]=[];if(custom[qk].indexOf(v)===-1)custom[qk].unshift(v);ls(K.cu,custom);closeSheet();renderPick("subs");setTimeout(function(){openNote(qk,v);},280);};setTimeout(function(){var n=document.getElementById("cin");if(n)n.focus();},320);}

  var revealScrim=document.getElementById("reveal"),revealCard=document.getElementById("revealCard");
  function reveal(e){var q=quadByKey(e.quad);revealCard.innerHTML='<div class="rcardbox" style="background:linear-gradient(150deg,'+q.c1+' 0%,'+q.c2+' 100%)"><div class="cglow" style="background:'+q.c1+'"></div><div class="ctag" style="color:'+q.accent+'">此刻 · '+esc(e.emotion)+'</div><div class="cmsg">'+esc(e.msg)+'</div><div class="cdate">'+fmtFull(e.ts)+'</div></div>';revealScrim.classList.add("on");}
  document.getElementById("revealDone").onclick=function(){revealScrim.classList.remove("on");};
  revealScrim.onclick=function(ev){if(ev.target===revealScrim)revealScrim.classList.remove("on");};

  var recInner=document.getElementById("recInner"),recQuery="",recRoot="home";
  function renderRecords(){
    var q=recQuery.trim().toLowerCase();
    var list=entries.filter(function(e){if(!q)return true;return (e.emotion&&e.emotion.toLowerCase().indexOf(q)>=0)||(e.note&&e.note.toLowerCase().indexOf(q)>=0)||(e.topic&&e.topic.toLowerCase().indexOf(q)>=0);});
    var h='<button class="back" id="rb">'+backsvg()+'返回</button><h1 class="title" style="margin-bottom:2px">情绪记录</h1><div class="sub" style="margin-bottom:18px">共 '+entries.length+' 条</div><div class="search">'+ic("srch")+'<input id="si" type="text" placeholder="搜索情绪、笔记…" value="'+esc(recQuery)+'"></div>';
    if(list.length===0) h+='<div class="empty">'+(entries.length===0?'还没有记录。<br>回到首页，记下此刻的感觉吧。':'没有找到匹配的记录。')+'</div>';
    else{var last=null;list.forEach(function(e){var lb=dateLabel(e.ts);if(lb!==last){h+='<div class="dateh">'+lb+'</div>';last=lb;}var q2=quadByKey(e.quad);h+='<div class="rec"><div class="rtop"><span class="rdot" style="background:'+q2.c2+'"></span><span class="rnm" style="color:'+q2.accent+'">'+esc(e.emotion)+'</span>'+(e.level?'<span class="rlv">'+e.level+'</span>':'')+'<span class="rtm">'+hm(e.ts)+'</span></div>'+(e.note?'<div class="rnt">'+esc(e.note)+'</div>':'')+'<div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="back" data-del="'+e.id+'" style="margin:0;color:var(--ink-faint);font-size:var(--t-sub)">删除</button></div></div>';});}
    recInner.innerHTML=h;
    document.getElementById("rb").onclick=function(){show(recRoot,recRoot);};
    var si=document.getElementById("si");si.oninput=function(){recQuery=si.value;var p=si.selectionStart;renderRecords();var n=document.getElementById("si");n.focus();try{n.setSelectionRange(p,p);}catch(e){}};
    Array.prototype.forEach.call(recInner.querySelectorAll("[data-del]"),function(b){b.onclick=function(){var id=parseInt(b.getAttribute("data-del"),10);entries=entries.filter(function(e){return e.id!==id;});ls(K.en,entries);if(profile.moodColor)applyTheme();renderRecords();};});
  }

  var introRoot="meditate";
  function openIntro(id,root){
    var it=itemById(id); if(!it) return; stopAudio(); introRoot=root||"meditate";
    var up='<div class="uploads"><div class="uh">封面与音频：建议放进 GitHub 的 assets/ 文件夹（永久、跨设备）；也可以在这里临时上传（存本机）</div><div class="urow"><button class="ubtn'+(coverUrl[it.id]?' has':'')+'" id="upImg">'+ic("img")+(coverUrl[it.id]?'已换封面':'上传封面图')+'</button><button class="ubtn'+(mediaidx[it.id]==="audio"?' has':'')+'" id="upAud">'+ic("snd")+(mediaidx[it.id]==="audio"?'已换音频':'上传音频')+'</button>'+(it.type==="breath"?'<button class="ubtn'+(mediaidx[it.id]==="video"?' has':'')+'" id="upVid">'+ic("vid")+(mediaidx[it.id]==="video"?'已加视频':'上传视频')+'</button>':'')+'</div></div>';
    var h='<button class="back" id="ib">'+backsvg()+'返回</button><div class="hero" style="'+coverStyle(it)+'"></div><h1 class="ititle">'+it.n+'</h1><p class="imeta2">'+it.meta+'</p><div class="desc">'+it.desc+'</div>';
    if(it.type==="breath"||it.type==="guide"){ h+='<button class="startbtn" id="startBtn">开始练习</button>'+up; }
    else { h+='<div class="center"><div class="pbar" id="pbar"><div class="pfl" id="pfl"></div></div><div class="ptm"><span id="ptc">0:00</span><span id="ptd">--:--</span></div><button class="pplay" id="play">'+svgPlay()+'</button></div>'+up; }
    document.getElementById("introInner").innerHTML=h; show("intro",introRoot);
    document.getElementById("ib").onclick=function(){stopAudio();backTo(introRoot);};
    bindUploads(it);
    if(it.type==="breath"||it.type==="guide"){ document.getElementById("startBtn").onclick=function(){openRun(it);}; }
    else { var aud=document.getElementById("aud"),play=document.getElementById("play");
      play.onclick=function(){if(aud.paused){resolveAudio(it,aud,false);countSession(it);play.innerHTML=svgPause();}else{aud.pause();play.innerHTML=svgPlay();}};
      aud.ontimeupdate=function(){if(!aud.duration||!isFinite(aud.duration))return;document.getElementById("pfl").style.width=(aud.currentTime/aud.duration*100)+"%";document.getElementById("ptc").textContent=fmtSec(aud.currentTime);document.getElementById("ptd").textContent=fmtSec(aud.duration);};
      aud.onended=function(){play.innerHTML=svgPlay();};
      var pb=document.getElementById("pbar");pb.onclick=function(ev){var r=pb.getBoundingClientRect();if(aud.duration&&isFinite(aud.duration))aud.currentTime=(ev.clientX-r.left)/r.width*aud.duration;};
    }
  }
  function backTo(root){ if(root==="home"){renderHome();show("home","home");}else if(root==="courses"){renderCourses();show("courses","courses");}else{renderMeditate();show("meditate","meditate");} }
  function bindUploads(it){
    var ui=document.getElementById("upImg");if(ui)ui.onclick=function(){pickFile("image/*",function(f){idbPut("cover_"+it.id,f,"cover").then(function(){coverUrl[it.id]=URL.createObjectURL(f);coveridx[it.id]=true;ls(K.cov,coveridx);openIntro(it.id,introRoot);}).catch(function(){alert("保存失败：文件可能太大。");});});};
    var ua=document.getElementById("upAud");if(ua)ua.onclick=function(){pickFile("audio/*",function(f){idbPut("media_"+it.id,f,"audio").then(function(){mediaidx[it.id]="audio";ls(K.med2,mediaidx);openIntro(it.id,introRoot);}).catch(function(){alert("保存失败：文件可能太大。");});});};
    var uv=document.getElementById("upVid");if(uv)uv.onclick=function(){pickFile("video/*",function(f){idbPut("media_"+it.id,f,"video").then(function(){mediaidx[it.id]="video";ls(K.med2,mediaidx);openIntro(it.id,introRoot);}).catch(function(){alert("保存失败：文件可能太大。");});});};
  }
  function pickFile(accept,cb){var i=document.createElement("input");i.type="file";i.accept=accept;i.onchange=function(){if(i.files&&i.files[0])cb(i.files[0]);};i.click();}
  function resolveAudio(it,aud,loop){
    aud.loop=!!loop;
    function play(src){aud.src=src;var p=aud.play();if(p&&p.catch)p.catch(function(){});}
    if(mediaidx[it.id]==="audio"){ idbGet("media_"+it.id).then(function(r){if(r){play(URL.createObjectURL(r.blob));}else fb();}).catch(fb); }
    else fb();
    function fb(){ var srcs=["assets/"+it.id+".mp3",DEF_AUDIO],i=1;aud.onerror=function(){if(i<srcs.length)play(srcs[i++]);};play(srcs[0]); }
  }
  function stopAudio(){try{var a=document.getElementById("aud");a.pause();a.loop=false;a.onerror=null;a.ontimeupdate=null;a.onended=null;}catch(e){}}

  var timer=null;
  function openRun(it){
    var hasVideo=mediaidx[it.id]==="video",inner="";
    if(it.type==="guide"){
      inner='<div class="run"><div style="font-size:18px;line-height:2.2;color:var(--ink);margin-bottom:10px" id="gsteps"></div><div class="rcount" id="rcount" style="font-size:30px"></div><div class="rcycle" id="rcycle"></div><button class="rstop" id="stopBtn">开始</button></div>';
    } else {
      var visual=hasVideo?'<video class="rvideo" id="rvid" playsinline muted loop></video>':'<div class="stage"><div class="ring2" id="ring2"></div><div class="ring" id="ring"></div><div class="rcenter"><div class="rphase" id="rphase">准备好了吗</div><div class="rcount" id="rcount">'+it.pattern[0].s+'</div></div></div>';
      inner='<div class="run">'+visual+(hasVideo?'<div class="rphase" id="rphase">准备好了吗</div><div class="rcount" id="rcount">'+it.pattern[0].s+'</div>':'')+'<div class="rcycle" id="rcycle"></div><button class="rstop" id="stopBtn">开始</button></div>';
    }
    var h='<button class="back" id="rnb">'+backsvg()+'返回</button><div class="center" style="margin-bottom:4px"><h2 style="font-size:var(--t-detail);font-weight:600;margin:0">'+it.n+'</h2></div>'+inner;
    document.getElementById("runInner").innerHTML=h; show("run",introRoot);
    document.getElementById("rnb").onclick=function(){stopRun();stopAudio();openIntro(it.id,introRoot);};
    if(hasVideo){var rv=document.getElementById("rvid");idbGet("media_"+it.id).then(function(r){if(r)rv.src=URL.createObjectURL(r.blob);});}
    var running=false,btn=document.getElementById("stopBtn");
    btn.onclick=function(){ if(running){running=false;stopRun();btn.textContent="开始";stopAudio();var rv=document.getElementById("rvid");if(rv)rv.pause();}
      else{running=true;btn.textContent="结束";countSession(it);resolveAudio(it,document.getElementById("aud"),true);var rv=document.getElementById("rvid");if(rv)rv.play();
        if(it.type==="guide")runGuide(it,0,0);else{if(!hasVideo)setRing(.62,0);enterPhase(it,0,0);}} };
    if(it.type!=="guide"&&!hasVideo)setRing(.62,0);
  }
  function setRing(sc,d){var r=document.getElementById("ring"),r2=document.getElementById("ring2");if(!r)return;r.style.transitionDuration=d+"s";r2.style.transitionDuration=d+"s";r.style.transform="scale("+sc+")";r2.style.transform="scale("+(sc+0.06)+")";}
  function enterPhase(it,i,cy){var p=it.pattern[i],left=p.s,ph=document.getElementById("rphase"),ct=document.getElementById("rcount"),cyc=document.getElementById("rcycle");if(ph)ph.textContent=p.n;if(ct)ct.textContent=p.s;if(cyc)cyc.textContent="第 "+(cy+1)+" 轮";var sc=p.n.indexOf("吸")>=0?1.0:(p.n.indexOf("呼")>=0?0.62:null);if(sc!==null)setRing(sc,p.s);timer=setInterval(function(){left--;if(left<=0){clearInterval(timer);var nx=(i+1)%it.pattern.length;enterPhase(it,nx,nx===0?cy+1:cy);}else if(ct)ct.textContent=left;},1000);}
  function runGuide(it,i,round){var steps=it.steps,st=document.getElementById("gsteps"),ct=document.getElementById("rcount"),cyc=document.getElementById("rcycle");if(st)st.textContent=steps[i];if(cyc)cyc.textContent="第 "+(round+1)+" 轮 · "+(i+1)+"/"+steps.length;var left=12;if(ct)ct.textContent=left;timer=setInterval(function(){left--;if(left<=0){clearInterval(timer);var nx=(i+1)%steps.length;runGuide(it,nx,nx===0?round+1:round);}else if(ct)ct.textContent=left;},1000);}
  function stopRun(){if(timer)clearInterval(timer);setRing(.62,.6);var ph=document.getElementById("rphase");if(ph)ph.textContent="准备好了吗";var cyc=document.getElementById("rcycle");if(cyc)cyc.textContent="";}
  var sessionLock={};
  function countSession(it){var lk=it.id+"_"+Math.floor(Date.now()/60000);if(sessionLock[lk])return;sessionLock[lk]=true;med.sessions+=1;var mm=(it.meta||"").match(/(\d+)\s*分钟/);med.minutes+=mm?parseInt(mm[1],10):0;med.days[dkey(Date.now())]=true;med.plays[it.id]=(med.plays[it.id]||0)+1;ls(K.me,med);}

  function openName(){openSheet('<h3>你的名字</h3><p>会显示在首页问候语里。</p><input type="text" id="nin" maxlength="12" value="'+esc(profile.name||"")+'" placeholder="写下你的名字"><button class="sheet-act primary" id="nok">保存</button><button class="sheet-act" id="ncl" style="margin-top:10px">取消</button>');document.getElementById("ncl").onclick=closeSheet;document.getElementById("nok").onclick=function(){var v=(document.getElementById("nin").value||"").trim()||"朋友";profile.name=v;ls(K.pf,profile);closeSheet();renderHome();};setTimeout(function(){var n=document.getElementById("nin");if(n)n.focus();},320);}
  function openSettings(){
    var sw=ACCENTS.map(function(a){var on=(!profile.moodColor&&(profile.accent||"").toLowerCase()===a.c.toLowerCase());return '<div class="sw'+(on?' on':'')+(profile.moodColor?' dim':'')+'" data-c="'+a.c+'" style="background:'+a.c+'">'+(on?'<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg>':'')+'</div>';}).join('');
    var h='<h3>偏好设置</h3><p>所有记录存在本机。上传的音视频与图片另存，不在备份里。</p>'+
      '<div class="prow"><span class="pic">'+ic("palette")+'</span><span class="plabel">心情变色</span><div class="tg'+(profile.moodColor?' on':'')+'" id="tgMood"></div></div><div class="pdiv"></div>'+
      '<div class="prow" style="padding-bottom:6px"><span class="pic">'+ic("palette")+'</span><span class="plabel">主题颜色</span></div>'+
      '<div class="swrow" id="swRow">'+sw+'</div><button class="linkbtn" id="resetTheme">恢复默认</button><div class="pdiv" style="margin:8px 0"></div>'+
      '<button class="sheet-act" id="bName">修改名字</button><button class="sheet-act" id="bExport">导出完整备份</button><button class="sheet-act" id="bImport">从备份恢复</button><button class="sheet-act danger" id="bClear">清空情绪记录</button><input type="file" id="fi" accept="application/json" style="display:none">';
    openSheet(h);
    var tg=document.getElementById("tgMood");
    tg.onclick=function(){profile.moodColor=!profile.moodColor;ls(K.pf,profile);applyTheme();openSettings();renderHome();};
    Array.prototype.forEach.call(document.querySelectorAll("#swRow .sw"),function(el){el.onclick=function(){profile.moodColor=false;profile.accent=el.getAttribute("data-c");ls(K.pf,profile);applyTheme();openSettings();renderHome();};});
    document.getElementById("resetTheme").onclick=function(){profile.moodColor=false;profile.accent=DEF_ACCENT;ls(K.pf,profile);applyTheme();openSettings();renderHome();};
    document.getElementById("bName").onclick=function(){closeSheet();setTimeout(openName,260);};
    document.getElementById("bExport").onclick=function(){var blob=new Blob([JSON.stringify({entries:entries,custom:custom,med:med,courses:customCourses,moments:moments,profile:profile,tree:tree},null,2)],{type:"application/json"});dl(blob,"此刻备份_"+ymd(Date.now())+".json");};
    var fi=document.getElementById("fi");document.getElementById("bImport").onclick=function(){fi.click();};
    fi.onchange=function(){var f=fi.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{var d=JSON.parse(r.result);if(d&&Array.isArray(d.entries)){entries=d.entries;custom=d.custom||{};med=d.med||med;customCourses=d.courses||customCourses;moments=d.moments||moments;profile=d.profile||profile;tree=d.tree||tree;}ls(K.en,entries);ls(K.cu,custom);ls(K.me,med);ls(K.cc,customCourses);ls(K.mom,moments);ls(K.pf,profile);ls(K.tree,tree);applyTheme();renderHome();closeSheet();alert("恢复成功。图片/音视频需要重新上传。");}catch(e){alert("文件读不出来，确认是导出的备份吗？");}};r.readAsText(f);};
    document.getElementById("bClear").onclick=function(){if(confirm("清空全部情绪记录？无法撤销。")){entries=[];ls(K.en,entries);applyTheme();renderHome();closeSheet();}};
  }

  var scrim=document.getElementById("scrim"),sheet=document.getElementById("sheet");
  function openSheet(h){sheet.innerHTML=h;scrim.classList.add("on");sheet.classList.add("on");}
  function closeSheet(){scrim.classList.remove("on");sheet.classList.remove("on");}
  scrim.onclick=closeSheet;

  function goTab(t){ if(t==="home"){renderHome();show("home","home");}else if(t==="courses"){renderCourses();show("courses","courses");}else if(t==="meditate"){renderMeditate();show("meditate","meditate");}else{recRoot="grow";renderGrow();show("grow","grow");} }
  Array.prototype.forEach.call(document.querySelectorAll(".navbtn"),function(b){b.onclick=function(){goTab(b.getAttribute("data-go"));};});

  applyTheme();
  renderHome();
  if(navigator.storage&&navigator.storage.persist)navigator.storage.persist().catch(function(){});
  if(idbOK){
    Object.keys(coveridx).forEach(function(id){ idbGet("cover_"+id).then(function(r){if(r)coverUrl[id]=URL.createObjectURL(r.blob);}).catch(function(){}); });
    Object.keys(momidx).forEach(function(id){ idbGet("moment_"+id).then(function(r){if(r){momentUrl[id]=URL.createObjectURL(r.blob);renderMoments();}}).catch(function(){}); });
  }
})();
</script>
</body>
